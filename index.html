<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1613">
<meta name="referrer" content="no-referrer">
<title>우드 플로어 색상표 & MINI게임 (고화질)</title>
<style>
  :root{--bg:#1a1613;--card:#262019;--line:#3a3229;--txt:#ece4d8;--sub:#a89a86;
    --accent:#c8a06a;--correct:#4a7c59;--wrong:#9c4a3c;
    --disc:#9c4a3c;--soon:#b8873c;--normal:#4a7c59;
    --safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html{-webkit-text-size-adjust:100%}
  body{background:var(--bg);color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    padding-bottom:calc(40px + var(--safe-bot));overscroll-behavior-y:none}
  .tabs{position:sticky;top:0;z-index:20;display:flex;background:var(--bg);
    border-bottom:1px solid var(--line);padding-top:var(--safe-top)}
  .tabs button{flex:1;background:none;border:none;color:var(--sub);
    padding:16px 8px;font-size:15px;font-weight:600;cursor:pointer;
    border-bottom:2.5px solid transparent;touch-action:manipulation}
  .tabs button.on{color:var(--accent);border-bottom-color:var(--accent)}
  .page{padding:16px 12px 0;display:none;max-width:640px;margin:0 auto}
  .page.on{display:block}
  h1{font-size:20px;color:var(--accent);text-align:center;margin-bottom:4px}
  .subt{text-align:center;color:var(--sub);font-size:12px;margin-bottom:14px}
  h2{font-size:16px;margin:26px 0 4px;padding-bottom:7px;border-bottom:1px solid var(--line)}
  h2 span{color:var(--accent)}
  .dir{color:var(--sub);font-size:11px;margin-bottom:12px}
  .legend{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:14px;
    background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 10px}
  .legend span{font-size:11px;display:flex;align-items:center;gap:5px;color:var(--sub)}
  .dot{width:10px;height:10px;border-radius:50%;display:inline-block}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden;position:relative}
  .card.discontinued{opacity:.72}
  .rank{position:absolute;top:7px;left:7px;background:rgba(0,0,0,.65);color:#fff;
    width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;z-index:2}
  .statusbadge{position:absolute;top:7px;right:7px;z-index:2;font-size:10px;font-weight:700;
    padding:3px 7px;border-radius:20px;color:#fff}
  .statusbadge.discontinued{background:var(--disc)}
  .statusbadge.soon{background:var(--soon)}
  .thumb{width:100%;aspect-ratio:9/11;background:#1c1712;position:relative}
  .thumb img{width:100%;height:100%;object-fit:cover;display:block}
  .thumb.loading::after{content:"불러오는 중…";position:absolute;inset:0;display:flex;
    align-items:center;justify-content:center;font-size:11px;color:var(--sub)}
  .thumb.err::after{content:"이미지 로드 실패";position:absolute;inset:0;display:flex;
    align-items:center;justify-content:center;font-size:11px;color:#e08a7c;text-align:center;padding:8px}
  .card.discontinued .thumb img{filter:grayscale(.5)}
  .swatch{padding:7px;text-align:center;font-size:11px;font-weight:700;letter-spacing:.3px}
  .code{padding:7px 6px 2px;font-size:13px;font-weight:600;text-align:center}
  .metric{padding:0 6px 9px;font-size:10px;color:var(--sub);text-align:center}
  .barline{display:flex;height:34px;border-radius:8px;overflow:hidden;margin-bottom:14px;border:1px solid var(--line)}
  .barline div{flex:1}
  .sortbar{display:flex;gap:6px;justify-content:center;position:sticky;
    top:calc(53px + var(--safe-top));background:var(--bg);padding:10px 0;z-index:15}
  .sortbar button{flex:1;max-width:120px;background:var(--card);color:var(--sub);border:1px solid var(--line);
    padding:11px 8px;border-radius:22px;font-size:13px;font-weight:600;cursor:pointer;touch-action:manipulation}
  .sortbar button.on{background:var(--accent);color:#221a10;border-color:var(--accent)}
  .sortnote{text-align:center;color:var(--sub);font-size:11px;margin-bottom:14px}
  .infonote{background:var(--card);border:1px solid var(--line);border-radius:10px;
    padding:10px 12px;font-size:11px;color:var(--sub);margin-bottom:16px;line-height:1.6}
  .gwrap{max-width:480px;margin:0 auto}
  .bar{display:flex;justify-content:space-between;align-items:center;background:var(--card);
    border:1px solid var(--line);border-radius:12px;padding:11px 14px;margin-bottom:14px;font-size:14px}
  .bar b{color:var(--accent)}
  .filter{display:flex;gap:6px;margin-bottom:14px;justify-content:center}
  .filter button{flex:1;background:var(--card);color:var(--sub);border:1px solid var(--line);
    padding:9px 6px;border-radius:20px;font-size:12px;cursor:pointer;touch-action:manipulation}
  .filter button.on{background:var(--accent);color:#221a10;border-color:var(--accent);font-weight:600}
  .imgbox{width:100%;aspect-ratio:9/11;max-height:52vh;border-radius:14px;overflow:hidden;
    border:1px solid var(--line);margin-bottom:14px;background:#1c1712}
  .imgbox img{width:100%;height:100%;object-fit:cover;display:block}
  .opts{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .opt{background:var(--card);border:1.5px solid var(--line);color:var(--txt);padding:18px 10px;
    border-radius:12px;font-size:17px;font-weight:600;cursor:pointer;transition:.15s;
    letter-spacing:.5px;touch-action:manipulation;min-height:58px}
  .opt:active{transform:scale(.97)}
  .opt.correct{background:var(--correct);border-color:var(--correct);color:#fff}
  .opt.wrong{background:var(--wrong);border-color:var(--wrong);color:#fff}
  .opt:disabled{cursor:default}
  .next{width:100%;margin-top:14px;background:var(--accent);color:#221a10;border:none;padding:17px;
    border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;opacity:0;pointer-events:none;
    transition:.2s;touch-action:manipulation}
  .next.show{opacity:1;pointer-events:auto}
  .next:active{transform:scale(.98)}
  .msg{text-align:center;margin-top:12px;font-size:15px;font-weight:600;min-height:22px}
  .msg.ok{color:#7fc98f}.msg.no{color:#e08a7c}
  .msg .st{display:block;font-size:12px;margin-top:3px;font-weight:600}
  .st.discontinued{color:#e08a7c}.st.soon{color:#e0b87c}.st.normal{color:#8fce9f}
  .end{text-align:center;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:34px 20px}
  .end h2{color:var(--accent);font-size:23px;margin-bottom:10px;border:none}
  .end p{color:var(--sub);margin-bottom:22px;font-size:15px}
  .end button{background:var(--accent);color:#221a10;border:none;padding:15px 30px;border-radius:12px;
    font-size:15px;font-weight:700;cursor:pointer;touch-action:manipulation}
  @media(min-width:500px){.grid{grid-template-columns:repeat(3,1fr)}}
  @media(min-width:640px){.grid{grid-template-columns:repeat(4,1fr)}}
</style></head>
<body>
<div class="tabs">
  <button id="tab-colors" class="on" onclick="showTab('colors')">📋 색상 정렬표</button>
  <button id="tab-game" onclick="showTab('game')">🎮 MINI게임</button>
</div>

<div class="page on" id="page-colors">
  <h1>우드 플로어 색상 정렬표</h1>
  <p class="subt">고화질 원본 이미지 · 기준을 선택해 정렬하세요</p>
  <div class="legend">
    <span><i class="dot" style="background:var(--normal)"></i>정상 판매</span>
    <span><i class="dot" style="background:var(--soon)"></i>단종예정(재고확인)</span>
    <span><i class="dot" style="background:var(--disc)"></i>단종(재고없음)</span>
  </div>
  <div class="sortbar">
    <button data-s="bright" class="on" onclick="setSort('bright')">밝기순</button>
    <button data-s="sat" onclick="setSort('sat')">채도순</button>
    <button data-s="val" onclick="setSort('val')">명도순</button>
  </div>
  <p class="sortnote" id="sortnote"></p>
  <div id="colorbody"></div>
  <div class="infonote">
    ※ A#14, A#20, C#14, C#15 시리즈는 재고표 확인 후 상담이 필요한 품목입니다.<br>
    ※ 단종·단종예정 표시는 매칭된 제품에만 반영되어 있습니다.<br>
    ※ 이미지가 안 보이면 인터넷 연결 또는 원본 저장소 접근 권한을 확인하세요.
  </div>
</div>

<div class="page" id="page-game">
  <div class="gwrap">
    <h1>제품 맞히기 MINI게임</h1>
    <p class="subt">이미지를 보고 제품 코드를 맞혀보세요</p>
    <div class="filter" id="gfilter">
      <button data-g="all" class="on">전체</button>
      <button data-g="15">15</button>
      <button data-g="16-18">16·17·18</button>
      <button data-g="19">19</button>
    </div>
    <div class="bar"><span>문제 <b id="qnum">1</b> / <span id="qtot">1</span></span><span>점수 <b id="score">0</b></span></div>
    <div id="gcore">
      <div class="imgbox"><img id="qimg" alt="제품 이미지" referrerpolicy="no-referrer"></div>
      <div class="opts" id="opts"></div>
      <div class="msg" id="msg"></div>
      <button class="next" id="next">다음 문제 →</button>
    </div>
    <div class="end" id="end" style="display:none">
      <h2 id="endtitle">완료!</h2><p id="endtext"></p>
      <button onclick="restart()">다시 하기</button>
    </div>
  </div>
</div>

const STLABEL={discontinued:'단종',soon:'단종예정',normal:'정상 판매'};
function showTab(t){
  document.getElementById('tab-colors').classList.toggle('on',t==='colors');
  document.getElementById('tab-game').classList.toggle('on',t==='game');
  document.getElementById('page-colors').classList.toggle('on',t==='colors');
  document.getElementById('page-game').classList.toggle('on',t==='game');
  window.scrollTo(0,0);
}
let curSort='bright';
const SORT_LABEL={
  bright:{key:'bright',note:'← 밝음 · 어두움 → (사람 눈에 보이는 밝기 기준)',lo:'밝음',hi:'어두움'},
  sat:{key:'sat',note:'← 선명함 · 탁함 → (색의 진하기 기준)',lo:'선명',hi:'탁함'},
  val:{key:'val',note:'← 밝음 · 어두움 → (HSV 명도값 기준)',lo:'밝음',hi:'어두움'}
};
function setSort(s){curSort=s;document.querySelectorAll('.sortbar button').forEach(b=>b.classList.toggle('on',b.dataset.s===s));renderColors();}
function renderColors(){
  const cfg=SORT_LABEL[curSort];
  document.getElementById('sortnote').textContent=cfg.note;
  const groups=[['15 시리즈','15'],['16 · 17 · 18 시리즈','16-18'],['19 시리즈','19']];
  let html='';
  groups.forEach(([title,g])=>{
    let arr=DATA.filter(d=>d.grp===g).slice().sort((a,b)=>b[cfg.key]-a[cfg.key]);
    let grad='<div class="barline">'+arr.map(d=>`<div style="background:${d.hex}"></div>`).join('')+'</div>';
    let cards=arr.map((d,i)=>{
      let txtcol=d.lum>140?'#1a1613':'#ece4d8';
      let val=curSort==='bright'?('밝기 '+d.bright):curSort==='sat'?('채도 '+d.sat):('명도 '+d.val);
      let badge = d.status!=='normal' ? `<div class="statusbadge ${d.status}">${STLABEL[d.status]}</div>` : '';
      return `<div class="card ${d.status}"><div class="rank">${i+1}</div>${badge}
      <div class="thumb loading"><img referrerpolicy="no-referrer" loading="lazy" src="${d.url}" alt="${d.code}"
        onload="this.parentNode.classList.remove('loading')"
        onerror="this.parentNode.classList.remove('loading');this.parentNode.classList.add('err');this.style.display='none'"></div>
      <div class="swatch" style="background:${d.hex};color:${txtcol}">${d.hex}</div>
      <div class="code">${d.code}</div><div class="metric">${val}</div></div>`;
    }).join('');
    html+=`<h2><span>${title}</span> (${arr.length}개)</h2><p class="dir">← ${cfg.lo} · ${cfg.hi} →</p>${grad}<div class="grid">${cards}</div>`;
  });
  document.getElementById('colorbody').innerHTML=html;
}
let pool=[],order=[],idx=0,score=0,answered=false,curG='all';
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;}
function buildPool(){
  pool=curG==='all'?DATA.slice():DATA.filter(d=>d.grp===curG);
  order=shuffle(pool);idx=0;score=0;answered=false;
  document.getElementById('qtot').textContent=order.length;
  document.getElementById('end').style.display='none';
  document.getElementById('gcore').style.display='block';render();
}
function render(){
  answered=false;const q=order[idx];
  document.getElementById('qnum').textContent=idx+1;
  document.getElementById('score').textContent=score;
  document.getElementById('qimg').src=q.url;
  document.getElementById('msg').textContent='';document.getElementById('msg').className='msg';
  document.getElementById('next').classList.remove('show');
  let others=pool.filter(d=>d.code!==q.code);
  let sameGrp=others.filter(d=>d.grp===q.grp);
  let base=sameGrp.length>=3?sameGrp:others;
  let wrong=shuffle(base).slice(0,3);let choices=shuffle([q,...wrong]);
  const ob=document.getElementById('opts');ob.innerHTML='';
  choices.forEach(c=>{const b=document.createElement('button');b.className='opt';b.textContent=c.code;b.onclick=()=>pick(b,c,q);ob.appendChild(b);});
}
function pick(btn,choice,q){
  if(answered)return;answered=true;
  document.querySelectorAll('.opt').forEach(b=>{b.disabled=true;if(b.textContent===q.code)b.classList.add('correct');});
  const msg=document.getElementById('msg');
  let stTxt = q.status!=='normal' ? `<span class="st ${q.status}">${STLABEL[q.status]} 제품</span>` : `<span class="st normal">정상 판매 제품</span>`;
  if(choice.code===q.code){score++;msg.innerHTML='정답! '+q.code+stTxt;msg.className='msg ok';}
  else{btn.classList.add('wrong');msg.innerHTML='오답 — 정답은 '+q.code+stTxt;msg.className='msg no';}
  document.getElementById('score').textContent=score;
  document.getElementById('next').classList.add('show');
}
document.getElementById('next').onclick=()=>{idx++;if(idx>=order.length)showEnd();else render();};
function showEnd(){
  document.getElementById('gcore').style.display='none';
  const e=document.getElementById('end');e.style.display='block';
  const pct=Math.round(score/order.length*100);
  document.getElementById('endtitle').textContent=pct>=80?'훌륭해요! 🎉':pct>=50?'좋아요! 👍':'다시 도전! 💪';
  document.getElementById('endtext').textContent=`${order.length}문제 중 ${score}개 정답 (${pct}%)`;
}
function restart(){buildPool();}
document.querySelectorAll('#gfilter button').forEach(b=>{
  b.onclick=()=>{document.querySelectorAll('#gfilter button').forEach(x=>x.classList.remove('on'));b.classList.add('on');curG=b.dataset.g;buildPool();};
});
renderColors();buildPool();
